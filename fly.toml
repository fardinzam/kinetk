# fly.toml app configuration file generated for kinetk on 2026-05-19T02:56:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kinetk'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile.worker'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
